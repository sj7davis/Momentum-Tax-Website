<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Staff Login — Momentum Tax</title>
<link rel="icon" type="image/jpeg" href="/img/favicon-32.jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--navy:#16314f;--navy-d:#0f2236;--steel:#4f7299;--steel-l:#6f8fb3;
        --ink:#1c2733;--muted:#5d6b7a;--line:#e4e9ef;--cream:#f3f6f9;
        --display:'Fraunces',Georgia,serif;--body:'Inter',-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--body);color:var(--ink);background:var(--cream);-webkit-font-smoothing:antialiased}
  .screen{min-height:100vh;display:grid;grid-template-columns:1.05fr .95fr}
  .aside{position:relative;overflow:hidden;color:#fff;display:flex;flex-direction:column;
        justify-content:space-between;padding:46px 48px;
        background:linear-gradient(150deg,rgba(11,24,40,.82),rgba(15,34,54,.62)),
                   url('/img/hero-melbourne.jpg') center 40%/cover no-repeat}
  .aside img{height:46px;width:auto}
  .aside .pitch h2{font-family:var(--display);font-weight:500;color:#fff;font-size:32px;line-height:1.14;max-width:15ch}
  .aside .pitch p{color:#cdd9e6;font-size:16px;max-width:36ch;margin-top:12px}
  .aside .fine{color:#9fb1c4;font-size:12px}
  .main{display:flex;align-items:center;justify-content:center;padding:40px 28px}
  .card{width:100%;max-width:380px}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--steel)}
  h1{font-family:var(--display);font-weight:500;color:var(--navy);font-size:30px;margin:8px 0 6px}
  p.lead{color:var(--muted);margin:0}
  label{display:block;font-size:13px;font-weight:600;margin:18px 0 7px}
  input{font:inherit;padding:12px 14px;border:1px solid var(--line);border-radius:9px;width:100%}
  input:focus{outline:2px solid var(--steel);outline-offset:1px;border-color:var(--steel)}
  button{font-family:var(--body);font-weight:600;border:0;border-radius:9px;padding:13px;cursor:pointer;
        width:100%;margin-top:16px;background:var(--navy);color:#fff;transition:.15s}
  button:hover{background:var(--navy-d)}
  .notice{padding:10px 14px;border-radius:9px;font-size:14px;margin:14px 0 0}
  .notice.ok{background:#e9f7ef;color:#1e8e4e}.notice.err{background:#fdecea;color:#c0392b}
  .alt{margin-top:22px;font-size:13px;color:var(--muted)}
  @media (max-width:820px){.screen{grid-template-columns:1fr}.aside{min-height:200px;padding:32px}.aside .pitch{display:none}}
</style>
</head>
<body>
<div class="screen">
  <aside class="aside">
    <img src="/img/logo-horizontal.png" alt="Momentum Tax" />
    <div class="pitch">
      <h2>Staff console</h2>
      <p>Onboarding review, document exchange, forms and client follow-ups.</p>
    </div>
    <div class="fine">Authorised staff only. Access is logged.</div>
  </aside>
  <main class="main">
    <div class="card">
      <div class="eyebrow">Staff access</div>
      <h1>Log in</h1>
      <p class="lead">Enter your staff email and we'll send you a secure one-time login link.</p>
      <div id="notice"></div>
      <label for="email">Staff email</label>
      <input id="email" type="email" placeholder="you@momentumtax.com.au" autocomplete="email"
             onkeydown="if(event.key==='Enter')login()" />
      <button onclick="login()">Send login link</button>
      <p class="alt">Not staff? <a href="/portal/">Go to the client portal →</a></p>
    </div>
  </main>
</div>
<script>
  const qp = k => new URLSearchParams(location.search).get(k);
  function notice(kind,msg){ document.getElementById('notice').innerHTML = `<div class="notice ${kind}">${msg}</div>`; }
  if(qp('error')==='invalid_or_expired'){ notice('err','That link was invalid or expired. Enter your email to get a new one.'); }
  async function login(){
    const email = document.getElementById('email').value.trim();
    if(!email){ return notice('err','Please enter your staff email.'); }
    const next = qp('next') || '';
    const r = await fetch('/staff/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,next})});
    const j = await r.json();
    notice('ok', j.message || 'Check your email for a login link.');
  }
</script>
</body>
</html>
